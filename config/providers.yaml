# 数据源路由与限速配置
#
# routing:  根据 asset_type + market 决定用哪个 Provider。
#           按顺序匹配，命中即停止。primary 是首选，fallback 是降级链。
#           字段: markets (列表, 缺省=全局), asset_type (必填), primary, fallback (列表, 可选)
#
# credentials: Provider 认证信息。${ENV} 格式从环境变量读取。
#
# rate_limit: 每个 Provider 的访问节奏控制，数据驱动，详见下方注释。

routing:
  - markets: [CN]
    asset_type: stock
    primary: akshare
  - markets: [HK, US, JP, UK, DE, FR]
    asset_type: stock
    primary: yfinance

  - markets: [CN]
    asset_type: index
    primary: akshare
  - markets: [HK, US, JP, UK, DE, FR]
    asset_type: index
    primary: yfinance

  - markets: [CN]
    asset_type: bond
    primary: akshare
  - markets: [US]
    asset_type: bond
    primary: fred

  - asset_type: forex
    primary: yfinance

  - asset_type: commodity
    primary: yfinance

  - asset_type: crypto
    primary: coingecko
    fallback: [yfinance]

  - markets: [CN]
    asset_type: macro
    primary: akshare
  - markets: [US, JP, UK, DE, FR]
    asset_type: macro
    primary: fred

  - markets: [CN]
    asset_type: news
    primary: news_cn
  - markets: [US, HK, JP, UK, DE, FR]
    asset_type: news
    primary: news_global

credentials:
  fred:
    api_key: "${FRED_API_KEY}"

# ── 限速配置 ─────────────────────────────────────────
# 控制每个 Provider 的访问节奏，防止被封 IP / 触发限流。
# 限速模块 (src/data/rate_limiter.py) 读取此配置，纯数据驱动，
# 不写死任何 Provider 特定逻辑。
#
# 参数说明：
#   min_interval_ms   两次请求之间的最小间隔 (毫秒)。加随机抖动后实际在
#                     [min*(1-jitter), min*(1+jitter)] 区间内波动。
#   max_retries       单次请求的最大重试次数。含首次，即 1=不重试。
#   backoff           退避策略。linear: base*N, exponential: base*2^(N-1),
#                     fixed: 每次固定 base。N 为当前重试序号 (1-based)。
#   backoff_base_ms   退避基数 (毫秒)。重试前等待的基准时长。
#   jitter_pct        随机抖动百分比 (0-100)。避免规律请求被反爬识别。
#                     实际延迟 += uniform(-jitter, +jitter) × 基准值。
#   cooldown_failures 连续失败 N 次后进入冷却期，期间拒绝所有请求。
#   cooldown_ms       冷却期时长 (毫秒)。冷却结束后自动恢复。
#
# 未列出的 Provider 使用 default 配置。
rate_limit:
  default:
    min_interval_ms: 1000
    max_retries: 1
    backoff: linear
    backoff_base_ms: 2000
    jitter_pct: 20
    cooldown_failures: 3
    cooldown_ms: 30000

  akshare:
    min_interval_ms: 2000
    max_retries: 3
    backoff: exponential
    backoff_base_ms: 2000
    jitter_pct: 20
    cooldown_failures: 5
    cooldown_ms: 60000

  yfinance:
    min_interval_ms: 3000
    max_retries: 2
    backoff: exponential
    backoff_base_ms: 5000
    jitter_pct: 15
    cooldown_failures: 5
    cooldown_ms: 120000

  coingecko:
    min_interval_ms: 6000
    max_retries: 2
    backoff: exponential
    backoff_base_ms: 10000
    jitter_pct: 10
    cooldown_failures: 3
    cooldown_ms: 120000

  fred:
    min_interval_ms: 1000
    max_retries: 2
    backoff: linear
    backoff_base_ms: 2000
    jitter_pct: 20
    cooldown_failures: 3
    cooldown_ms: 60000

  cninfo:
    min_interval_ms: 2000
    max_retries: 2
    backoff: exponential
    backoff_base_ms: 2000
    jitter_pct: 20
    cooldown_failures: 3
    cooldown_ms: 60000

  baostock:
    min_interval_ms: 500
    max_retries: 1
    backoff: fixed
    backoff_base_ms: 1000
    jitter_pct: 20
    cooldown_failures: 5
    cooldown_ms: 30000

  news_cn:
    min_interval_ms: 2000
    max_retries: 2
    backoff: exponential
    backoff_base_ms: 2000
    jitter_pct: 20
    cooldown_failures: 5
    cooldown_ms: 60000
